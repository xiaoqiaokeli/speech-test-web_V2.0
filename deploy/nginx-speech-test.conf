# 言语测试站点 Nginx 配置
# 放置于 /etc/nginx/conf.d/speech-test.conf （或 sites-available + 软链）
# HTTPS 部分由 certbot 自动追加/修改。

server {
    listen 80;
    listen [::]:80;
    server_name hearing.hnboy2005.info;

    root /var/www/speech-test;
    index index.html;

    charset utf-8;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;
    gzip_min_length 1024;

    # 讯飞 token 接口 -> 本机 Node 服务
    location = /api/xfyun-token {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store";
    }

    # 音频文件：内容不变，长缓存
    location /audio/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 图片长缓存
    location ~* \.(png|jpg|jpeg|webp|ico)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # html/js/css 短缓存，保证更新及时可见
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
